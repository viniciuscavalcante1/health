<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d0c">
<title>VidaFlow</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💚</text></svg>">
<link rel="manifest" href="data:application/json,{%22name%22:%22VidaFlow%22,%22short_name%22:%22VidaFlow%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%230d0d0c%22,%22theme_color%22:%22%230d0d0c%22}">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0c;--s1:#161615;--s2:#1e1e1d;--s3:#282827;
  --b1:#333331;--b2:#444441;
  --t1:#f2f2ef;--t2:#c5c5bb;--t3:#8a897f;
  --g:#4ADE80;--gd:#142e1d;--r:#F87171;--rd:#2d1516;--o:#FBBF24;
  --blue:#60A5FA;--purple:#C084FC;--teal:#2DD4BF;
  --font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;--rad:8px;
}
html{font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100dvh;-webkit-font-smoothing:antialiased}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:var(--t2)}
input,select,textarea{font-family:var(--font);background:none;border:none;color:var(--t1);outline:none}
::selection{background:var(--g);color:#111}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px}

/* ═══ LAYOUT ═══ */
.shell{display:flex;height:100dvh;overflow:hidden}
.side{width:230px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.main{flex:1;overflow-y:auto;padding:0}
.content{padding:20px 24px 80px;max-width:900px;margin:0 auto}

/* ═══ SIDEBAR ═══ */
.s-hdr{padding:16px 14px 12px;border-bottom:1px solid var(--b1)}
.s-hdr h1{font-family:var(--mono);font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:6px}
.s-hdr h1 em{color:var(--g);font-style:normal}
.s-date{font-family:var(--mono);font-size:.62rem;color:var(--t3);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.s-nav{padding:8px 8px 4px;flex:1;overflow-y:auto}
.si{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;font-size:.82rem;font-weight:500;color:var(--t2);cursor:pointer;transition:all .07s;width:100%;text-align:left}
.si:hover{background:var(--s2);color:var(--t1)}.si.on{background:var(--s3);color:var(--t1);font-weight:600}
.si .ic{width:20px;text-align:center;font-size:.88rem;flex-shrink:0}
.s-sep{height:1px;background:var(--b1);margin:6px 10px}

/* ═══ PAGE TITLES ═══ */
.pg-title{font-family:var(--mono);font-size:1rem;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.pg-title .cnt{font-weight:500;color:var(--t3);font-size:.78rem}
.pg-title .right{margin-left:auto;display:flex;gap:6px;align-items:center}

/* ═══ CARDS ═══ */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);padding:16px;margin-bottom:10px;transition:border-color .08s}
.card:hover{border-color:var(--b2)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.card-sm{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);padding:14px}
.card-sm .card-label{font-family:var(--mono);font-size:.58rem;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.card-sm .card-val{font-family:var(--mono);font-size:1.3rem;font-weight:700}
.card-sm .card-sub{font-family:var(--mono);font-size:.62rem;color:var(--t3);margin-top:4px}

/* ═══ PROGRESS BAR ═══ */
.prog{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;margin:8px 0}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}
.prog-fill.green{background:var(--g)}.prog-fill.blue{background:var(--blue)}.prog-fill.orange{background:var(--o)}.prog-fill.red{background:var(--r)}.prog-fill.purple{background:var(--purple)}.prog-fill.teal{background:var(--teal)}

/* ═══ BUTTONS ═══ */
.btn-p{padding:8px 16px;border-radius:var(--rad);background:var(--g);color:#111;font-weight:600;font-size:.82rem;transition:opacity .1s;cursor:pointer;border:none}.btn-p:hover{opacity:.85}
.btn-s{padding:7px 14px;border-radius:var(--rad);border:1px solid var(--b1);color:var(--t2);font-size:.8rem;transition:all .1s;cursor:pointer;background:none}.btn-s:hover{border-color:var(--t3);color:var(--t1)}
.btn-d{padding:7px 14px;border-radius:var(--rad);background:var(--rd);color:var(--r);font-size:.8rem;transition:opacity .1s;cursor:pointer;border:none}.btn-d:hover{opacity:.85}
.btn-icon{width:34px;height:34px;border-radius:var(--rad);border:1px solid var(--b1);background:var(--s1);color:var(--t2);font-size:.88rem;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .08s}.btn-icon:hover{border-color:var(--b2);color:var(--t1);background:var(--s2)}
.btn-qk{padding:6px 12px;border-radius:6px;border:1px solid var(--b1);font-size:.78rem;font-weight:500;transition:all .08s;cursor:pointer;color:var(--t2);display:inline-flex;align-items:center;gap:5px;background:none}
.btn-qk:hover{border-color:var(--g);color:var(--g);background:var(--gd)}

/* ═══ FORM ═══ */
.fg{margin-bottom:12px}
.fl{font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:4px;display:block;font-weight:600}
.fi{width:100%;padding:9px 12px;border-radius:var(--rad);border:1px solid var(--b1);background:var(--s2);color:var(--t1);font-size:.88rem;outline:0;transition:border-color .1s}
.fi:focus{border-color:var(--g)}
.fi-sm{padding:7px 10px;font-size:.82rem}
select.fi{cursor:pointer;-webkit-appearance:none;appearance:none}
textarea.fi{min-height:60px;resize:vertical;line-height:1.5}
.fi-row{display:flex;gap:8px;align-items:center}
.fi-row .fi{flex:1}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.chip-row{display:flex;gap:4px;flex-wrap:wrap}
.chip{padding:5px 10px;border-radius:6px;border:1px solid var(--b1);font-size:.78rem;font-weight:500;cursor:pointer;color:var(--t2);transition:all .08s}
.chip:hover{border-color:var(--b2);color:var(--t1)}
.chip.on{border-color:var(--g);color:var(--g);background:var(--gd);font-weight:600}

/* ═══ MODAL ═══ */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;animation:fi .08s}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.mo{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:20px;width:100%;max-width:500px;animation:su .1s;max-height:85dvh;overflow-y:auto;margin:12px}
.mo h3{font-size:.98rem;font-weight:700;margin-bottom:16px}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);padding:8px 16px;font-family:var(--mono);font-size:.78rem;z-index:200;animation:su .1s;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast.err{border-color:var(--r);color:var(--r)}.toast.ok{border-color:var(--g);color:var(--g)}

/* ═══ LOCK SCREEN ═══ */
.lock{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:20px}
.lock h1{font-family:var(--mono);font-size:1.5rem;font-weight:700;margin-bottom:6px}
.lock p{color:var(--t3);font-size:.88rem;margin-bottom:24px}
.lock-dots{display:flex;gap:12px;margin-bottom:22px}
.lock-dot{width:13px;height:13px;border-radius:50%;background:var(--s3);transition:all .2s}
.lock-dot.f{background:var(--g)}.lock-dot.w{background:var(--r);animation:shk .3s}
.lock-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:220px}
.lk{width:66px;height:66px;border-radius:50%;border:1px solid var(--b1);background:var(--s1);color:var(--t1);font-family:var(--mono);font-size:1.2rem;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all .08s}
.lk:hover{background:var(--s2)}.lk:active{background:var(--s3);transform:scale(.95)}
.lk.emp{border:none;background:none;cursor:default}.lk.emp:hover{background:none}
.lock-rm{font-family:var(--mono);font-size:.6rem;color:var(--t3);margin-top:18px;cursor:pointer;background:0;border:0;padding:4px 8px}.lock-rm:hover{color:var(--t2)}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ═══ CONFETTI ═══ */
.cfw{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden}
.cfp{position:absolute;width:7px;height:7px;opacity:0;animation:cff 1s ease-out forwards}
@keyframes cff{0%{opacity:1;transform:translate(0,0) rotate(0) scale(1)}100%{opacity:0;transform:translate(var(--cx),var(--cy)) rotate(var(--cr)) scale(0)}}

/* ═══ WATER CIRCLE ═══ */
.water-ring{position:relative;width:200px;height:200px;margin:0 auto 20px}
.water-ring svg{transform:rotate(-90deg)}
.water-ring .label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.water-ring .val{font-family:var(--mono);font-size:1.8rem;font-weight:700}
.water-ring .sub{font-family:var(--mono);font-size:.65rem;color:var(--t3)}

/* ═══ HEATMAP ═══ */
.heatmap{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:16px}
.hm-cell{width:11px;height:11px;border-radius:2px;background:var(--s3);cursor:pointer;transition:transform .08s}
.hm-cell:hover{transform:scale(1.4)}
.hm-legend{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:.55rem;color:var(--t3);margin-bottom:10px}
.hm-legend span{width:11px;height:11px;border-radius:2px;display:inline-block}

/* ═══ CHECKLIST ROW ═══ */
.ck-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);margin-bottom:5px;cursor:pointer;transition:all .08s}
.ck-row:hover{border-color:var(--b2);background:var(--s2)}
.ck-row.done{opacity:.5}
.ck-row.done .ck-text{text-decoration:line-through}
.ck-box{width:20px;height:20px;border-radius:50%;border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .08s}
.ck-box.on{background:var(--g);border-color:var(--g)}
.ck-text{flex:1;font-size:.88rem;font-weight:500}
.ck-meta{font-family:var(--mono);font-size:.62rem;color:var(--t3)}
.ck-del{font-size:.68rem;color:var(--t3);opacity:0;transition:opacity .08s;padding:2px 4px;cursor:pointer}
.ck-row:hover .ck-del{opacity:1}.ck-del:hover{color:var(--r)!important}

/* ═══ BAR CHART ═══ */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:120px;padding:0 4px;margin:12px 0}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-fill{width:100%;border-radius:3px 3px 0 0;transition:height .3s;min-height:2px}
.bar-label{font-family:var(--mono);font-size:.52rem;color:var(--t3)}
.bar-val{font-family:var(--mono);font-size:.5rem;color:var(--t3)}

/* ═══ MOOD ═══ */
.mood-sel{display:flex;gap:8px;justify-content:center;margin:16px 0}
.mood-btn{font-size:2rem;padding:8px;border-radius:var(--rad);border:2px solid transparent;cursor:pointer;transition:all .1s;background:none}
.mood-btn:hover{transform:scale(1.15)}.mood-btn.on{border-color:var(--g);background:var(--gd);transform:scale(1.2)}
.mood-chart{display:flex;align-items:flex-end;gap:4px;height:80px;margin:12px 0}
.mood-dot{width:8px;height:8px;border-radius:50%;margin:0 auto}

/* ═══ CALENDAR ═══ */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:16px}
.cal-hdr{font-family:var(--mono);font-size:.55rem;color:var(--t3);text-align:center;padding:4px}
.cal-day{aspect-ratio:1;border-radius:4px;background:var(--s1);border:1px solid var(--b1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all .08s;min-height:40px;padding:2px}
.cal-day:hover{border-color:var(--b2)}
.cal-day.today{border-color:var(--g)}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default}
.cal-day .d-num{font-family:var(--mono);font-size:.62rem;font-weight:600}
.cal-day .d-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center}
.cal-day .d-dots span{width:5px;height:5px;border-radius:50%}

/* ═══ WORKOUT ═══ */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px}
.week-day{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);padding:10px;min-height:80px;cursor:pointer;transition:all .08s}
.week-day:hover{border-color:var(--b2)}
.week-day.today{border-color:var(--g)}
.week-day .wd-label{font-family:var(--mono);font-size:.58rem;color:var(--t3);margin-bottom:4px;text-transform:uppercase}
.week-day .wd-num{font-family:var(--mono);font-size:.75rem;font-weight:700;margin-bottom:6px}
.week-day .wd-item{font-size:.65rem;padding:3px 6px;border-radius:4px;margin-bottom:3px;background:var(--s3);color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.week-day .wd-item.done{background:var(--gd);color:var(--g)}

/* Focus mode */
.focus-mode{position:fixed;inset:0;background:var(--bg);z-index:90;overflow-y:auto;padding:20px;display:flex;flex-direction:column;align-items:center}
.focus-mode .fm-top{width:100%;max-width:600px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.focus-mode .fm-timer{font-family:var(--mono);font-size:2.5rem;font-weight:700;text-align:center;margin-bottom:20px;color:var(--g)}
.focus-mode .fm-exercise{width:100%;max-width:600px}
.fm-set-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);margin-bottom:4px;cursor:pointer}
.fm-set-row.done{opacity:.4;background:var(--gd)}
.fm-rest{text-align:center;padding:30px;font-family:var(--mono);font-size:2rem;color:var(--o)}

/* ═══ SCORE ═══ */
.score-big{font-family:var(--mono);font-size:3rem;font-weight:700;text-align:center;line-height:1}
.score-label{font-family:var(--mono);font-size:.65rem;color:var(--t3);text-align:center;margin-top:4px}

/* ═══ TIMELINE ═══ */
.timeline{position:relative;padding-left:20px;margin:16px 0}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:var(--b1)}
.tl-item{position:relative;margin-bottom:14px;padding-left:16px}
.tl-item::before{content:'';position:absolute;left:-17px;top:6px;width:10px;height:10px;border-radius:50%;background:var(--s3);border:2px solid var(--b1)}
.tl-item.active::before{background:var(--g);border-color:var(--g)}
.tl-date{font-family:var(--mono);font-size:.58rem;color:var(--t3)}
.tl-title{font-weight:600;font-size:.88rem}
.tl-desc{font-size:.78rem;color:var(--t3)}

/* ═══ BADGES ═══ */
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.badge{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);padding:16px;text-align:center;cursor:pointer;transition:all .1s}
.badge:hover{border-color:var(--b2)}
.badge.locked{opacity:.35;filter:grayscale(1)}
.badge .b-icon{font-size:2rem;margin-bottom:6px}
.badge .b-name{font-family:var(--mono);font-size:.7rem;font-weight:600}
.badge .b-date{font-family:var(--mono);font-size:.55rem;color:var(--t3);margin-top:4px}

/* ═══ TABLE ═══ */
.tbl{width:100%;border-collapse:collapse;margin:12px 0}
.tbl th{font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);text-align:left;padding:8px 10px;border-bottom:1px solid var(--b1)}
.tbl td{padding:8px 10px;font-size:.85rem;border-bottom:1px solid var(--b1);color:var(--t2)}
.tbl tr:hover td{background:var(--s1)}

/* ═══ TABS ═══ */
.tabs{display:flex;gap:2px;background:var(--s2);border-radius:6px;padding:2px;margin-bottom:16px;overflow-x:auto}
.tab-btn{padding:6px 14px;border-radius:4px;font-family:var(--mono);font-size:.72rem;font-weight:600;color:var(--t3);cursor:pointer;transition:all .08s;border:none;background:none;white-space:nowrap}
.tab-btn:hover{color:var(--t2)}.tab-btn.on{background:var(--s3);color:var(--t1)}

/* ═══ COLOR PICKER ═══ */
.cpk{display:flex;gap:5px;flex-wrap:wrap}
.cpk span{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .08s}
.cpk span:hover,.cpk span.on{border-color:var(--t1);transform:scale(1.1)}

/* ═══ SEARCH ═══ */
.search-bar{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);padding:0 12px;margin-bottom:12px;transition:border-color .1s}
.search-bar:focus-within{border-color:var(--g)}
.search-bar input{flex:1;padding:9px 0;font-size:.86rem}
.search-bar input::placeholder{color:var(--t3)}

/* ═══ RESPONSIVE ═══ */
.sb-tog{display:none;position:fixed;top:8px;left:8px;z-index:90;width:34px;height:34px;border-radius:var(--rad);border:1px solid var(--b1);background:var(--s1);color:var(--t1);font-size:.92rem;align-items:center;justify-content:center}
@media(max-width:700px){
  .side{position:fixed;left:-240px;top:0;bottom:0;z-index:80;transition:left .15s}.side.open{left:0}
  .sb-tog{display:flex}
  .card-grid{grid-template-columns:1fr}
  .week-grid{grid-template-columns:repeat(3,1fr)}
  .badge-grid{grid-template-columns:repeat(2,1fr)}
  .content{padding:16px 12px 80px}
}
.empty{text-align:center;padding:44px 18px;color:var(--t3)}.empty p{font-size:.88rem;margin-bottom:10px}
.trend-up{color:var(--g)}.trend-down{color:var(--r)}.trend-same{color:var(--t3)}
.tag-pill{font-family:var(--mono);font-size:.6rem;padding:2px 7px;border-radius:3px;font-weight:600;display:inline-block}
.severity-1{color:#4ADE80}.severity-2{color:#60A5FA}.severity-3{color:#FBBF24}.severity-4{color:#FB923C}.severity-5{color:#F87171}
.inline-chart{display:flex;align-items:flex-end;gap:2px;height:40px}
.inline-bar{width:4px;border-radius:2px;background:var(--g);transition:height .3s}
</style>
</head>
<body>
<button class="sb-tog" onclick="document.querySelector('.side').classList.toggle('open')">☰</button>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════════
// VIDAFLOW - Health & Wellness Tracker
// ═══════════════════════════════════════════════════════════

// ═══ CONFIG ═══
const FB={apiKey:"AIzaSyBIL-pvTf4fvE-NuquiVXqkcedbXYssDL0",authDomain:"rotinavini.firebaseapp.com",databaseURL:"https://rotinavini-default-rtdb.firebaseio.com",projectId:"rotinavini",storageBucket:"rotinavini.firebasestorage.app",messagingSenderId:"926063710082",appId:"1:926063710082:web:892c51fef8d8c09c15099b"};

// ═══ FIREBASE ═══
let dbRef=null,fbOk=false,pushTm=null;
function initFB(){
  if(typeof firebase==='undefined')return;
  try{
    if(!firebase.apps.length)firebase.initializeApp(FB);
    dbRef=firebase.database().ref('health');fbOk=true;
    dbRef.on('value',snap=>{
      const d=snap.val();
      if(d){
        const local=getL();
        S.data=mergeData(local,d);
        setL(S.data);R();
      }
    });
  }catch(e){console.error('FB error:',e)}
}
function mergeData(local,remote){
  const merged={...defaultData()};
  const keys=Object.keys(merged);
  keys.forEach(k=>{
    if(remote&&remote[k]!==undefined&&remote[k]!==null){
      merged[k]=typeof remote[k]==='object'?{...merged[k],...remote[k]}:remote[k];
    }else if(local&&local[k]!==undefined&&local[k]!==null){
      merged[k]=typeof local[k]==='object'?{...merged[k],...local[k]}:local[k];
    }
  });
  return merged;
}
function save(){
  setL(S.data);clearTimeout(pushTm);
  pushTm=setTimeout(()=>{if(fbOk&&dbRef)dbRef.set(JSON.parse(JSON.stringify(S.data))).catch(console.error)},400);
}

const fmtDate=s=>{if(!s)return'';const p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0]};
const fmtDateFull=s=>{if(!s)return'';const d=new Date(s+'T12:00:00');return d.getDate()+' de '+MONTHS_PT[d.getMonth()]+', '+d.getFullYear()};
const fmtTime=t=>{const d=new Date(t);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')};
const fmtTimer=s=>{const m=Math.floor(s/60);const ss=s%60;return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0')};
const daysBetween=(a,b)=>Math.floor((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/(1000*60*60*24));
const daysAgo=n=>{const d=new Date();d.setDate(d.getDate()-n);return dateS(d)};
const clamp=(v,mn,mx)=>Math.max(mn,Math.min(mx,v));
const pct=(v,t)=>t>0?Math.round((v/t)*100):0;

function getWeekDates(){
  const today=new Date();
  const day=today.getDay();
  const mon=new Date(today);
  mon.setDate(today.getDate()-(day===0?6:day-1));
  const dates=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);dates.push(dateS(d))}
  return dates;
}

  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2200);
}

// ═══ DATA ACCESSORS ═══
const D=()=>S.data||defaultData();
function waterToday(){return D().water[todayS()]||{amount:0,goal:D().settings.waterGoal||2500,logs:[]}}
function moodToday(){return D().mood[todayS()]||null}
function routineItemsToday(){
  const items=D().routine.items||{};
  const log=D().routineLog[todayS()]||{};
  return Object.entries(items).sort((a,b)=>(a[1].order||0)-(b[1].order||0)).map(([id,it])=>({id,...it,done:!!log[id]}));
}
function supplementsToday(){
  const supps=D().supplements||{};
  const log=D().supplementLog[todayS()]||{};
  const today=new Date().getDay();
  return Object.entries(supps).filter(([id,s])=>{
    if(s.frequency==='daily')return true;
    if(s.frequency==='weekly'||s.frequency==='custom')return(s.days||[]).includes(today);
    return true;
  }).map(([id,s])=>({id,...s,done:!!log[id]}));
}
function workoutsForDate(ds){
  return Object.entries(D().workouts||{}).filter(([id,w])=>w.date===ds).map(([id,w])=>({id,...w}));
}
function calcScore(ds){
  const d=D();
  let score=0;
  // Water
  const w=d.water[ds];
  const wGoal=d.settings?.waterGoal||2500;
  if(w)score+=Math.min(20,Math.round((w.amount/wGoal)*20));
  // Supplements
  const supps=Object.keys(d.supplements||{});
  const sLog=d.supplementLog[ds]||{};
  if(supps.length>0){const taken=supps.filter(id=>sLog[id]).length;score+=Math.round((taken/supps.length)*20)}
  else score+=20;
  // Routine
  const rItems=Object.keys(d.routine?.items||{});
  const rLog=d.routineLog[ds]||{};
  if(rItems.length>0){const done=rItems.filter(id=>rLog[id]).length;score+=Math.round((done/rItems.length)*20)}
  else score+=20;
  // Workout
  const hasWorkout=Object.values(d.workouts||{}).some(w=>w.date===ds&&w.completed);
  if(hasWorkout)score+=20;
  // Mood
  const m=d.mood[ds];
  if(m)score+=Math.round((m.value/5)*20);
  return clamp(score,0,100);
}
function calcStreak(checkFn){
  let streak=0;
  for(let i=0;i<365;i++){
    const ds=daysAgo(i);
    if(checkFn(ds))streak++;
    else break;
  }
  return streak;
}
function calcLongestStreak(checkFn){
  let longest=0,cur=0;
  for(let i=365;i>=0;i--){
    if(checkFn(daysAgo(i))){cur++;longest=Math.max(longest,cur)}
    else cur=0;
  }
  return longest;
}

// ═══ BADGE CHECKER ═══
function checkBadges(){
  const d=D();
  if(!d.badges)d.badges={};
  let newUnlocks=[];

  function unlock(id){
    if(!d.badges[id]||!d.badges[id].unlocked){
      d.badges[id]={unlocked:true,date:todayS()};
      newUnlocks.push(id);
    }
  }

  // Iniciante
  unlock('iniciante');

  // Hidratado - 7 days water goal
  const waterStreak=calcStreak(ds=>{const w=d.water[ds];return w&&w.amount>=(d.settings?.waterGoal||2500)});
  if(waterStreak>=7)unlock('hidratado');

  // Máquina - 10 workouts this month
  const now=new Date();const monthKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const monthWorkouts=Object.values(d.workouts||{}).filter(w=>w.completed&&w.date&&w.date.startsWith(monthKey)).length;
  if(monthWorkouts>=10)unlock('maquina');

  // Consistente - 30 day routine streak
  const routineStreak=calcStreak(ds=>{const items=Object.keys(d.routine?.items||{});const log=d.routineLog[ds]||{};return items.length>0&&items.every(id=>log[id])});
  if(routineStreak>=30)unlock('consistente');

  // Novo PR
  if(Object.keys(d.prs||{}).length>0)unlock('novo_pr');

  // Dedicado - 7 days training
  const trainStreak=calcStreak(ds=>Object.values(d.workouts||{}).some(w=>w.date===ds&&w.completed));
  if(trainStreak>=7)unlock('dedicado');

  // Zen - 14 days mood
  let moodDays=0;for(let i=0;i<30;i++)if(d.mood[daysAgo(i)])moodDays++;
  if(moodDays>=14)unlock('zen');

  // Disciplinado
  const suppStreak=calcStreak(ds=>{const supps=Object.keys(d.supplements||{});const log=d.supplementLog[ds]||{};return supps.length>0&&supps.every(id=>log[id])});
  if(suppStreak>=7)unlock('disciplinado');

  // Transformação
  let weightDays=0;Object.keys(d.weight||{}).forEach(k=>{if(d.weight[k].weight)weightDays++});
  if(weightDays>=30)unlock('transformacao');

  // Semana Perfeita
  let perfStreak=calcStreak(ds=>calcScore(ds)>=80);
  if(perfStreak>=7)unlock('semana_perfeita');

  // Nutrição
  let mealDays=0;for(let i=0;i<30;i++)if((d.meals[daysAgo(i)]||[]).length>0)mealDays++;
  if(mealDays>=14)unlock('nutricao');

  // Detetive
  let symptomCount=0;Object.values(d.symptoms||{}).forEach(v=>{if(Array.isArray(v))symptomCount+=v.length});
  if(symptomCount>=10)unlock('detetive');

  // Cientista
  if(Object.keys(d.exams||{}).length>=5)unlock('cientista');

  // Escritor
  if(Object.keys(d.notes||{}).length>=20)unlock('escritor');

  // Maratonista
  const totalWorkouts=Object.values(d.workouts||{}).filter(w=>w.completed).length;
  if(totalWorkouts>=50)unlock('maratonista');

  if(newUnlocks.length>0){
    save();
    newUnlocks.forEach(id=>{
      const b=BADGES_DEF.find(x=>x.id===id);
      if(b)toast(`🏆 Conquista desbloqueada: ${b.name}!`,'ok');
    });
    if(newUnlocks.length>0)confetti();
  }
}

function R(){
  const root=document.getElementById('root');
  if(!S.data){S.data=getL();if(!S.data||!S.data.settings)S.data=defaultData();}
  // PIN check
  if(S.data.settings?.pin&&S.locked){root.innerHTML=renderLock();return}
  if(S.focusMode){root.innerHTML=renderFocusMode();return}
  root.innerHTML=`<div class="shell"><nav class="side">${renderSidebar()}</nav><main class="main"><div class="content">${renderView()}</div></main></div>${S.modal?renderModal():''}`;
  checkBadges();
}

function renderSidebar(){
  const today=new Date();
  const dateStr=DAYS_PT[today.getDay()]+', '+today.getDate()+' de '+MONTHS_PT[today.getMonth()];
  let h=`<div class="s-hdr"><h1>💚 <em>Vida</em>Flow</h1><div class="s-date">${dateStr}</div></div><div class="s-nav">`;
  const groups=[[0,0],[1,9],[10,10],[11,16]];
  VIEWS.forEach((v,i)=>{
    if(i===1||i===10||i===11)h+=`<div class="s-sep"></div>`;
    h+=`<button class="si${S.view===v?' on':''}" onclick="nav('${v}')"><span class="ic">${VIEW_LABELS[v].split(' ')[0]}</span>${VIEW_LABELS[v].split(' ').slice(1).join(' ')}</button>`;
  });
  h+=`</div>`;
  // Streaks summary at bottom
  const ws=calcStreak(ds=>{const w=D().water[ds];return w&&w.amount>=(D().settings?.waterGoal||2500)});
  const ts=calcStreak(ds=>Object.values(D().workouts||{}).some(w=>w.date===ds&&w.completed));
  if(ws>0||ts>0){
    h+=`<div style="padding:10px 14px;border-top:1px solid var(--b1);font-family:var(--mono);font-size:.6rem;color:var(--t3)">`;
    if(ws>0)h+=`<div>💧 ${ws} dias streak</div>`;
    if(ts>0)h+=`<div>🏋️ ${ts} dias streak</div>`;
    h+=`</div>`;
  }
  return h;
}

function nav(v){S.view=v;S.modal=null;document.querySelector('.side')?.classList.remove('open');R()}

  h+=`<div style="text-align:center"><div style="font-family:var(--mono);font-size:1.5rem;font-weight:700;color:var(--blue)">${waterStreak}</div><div style="font-family:var(--mono);font-size:.55rem;color:var(--t3)">💧 Água</div></div>`;
  h+=`<div style="text-align:center"><div style="font-family:var(--mono);font-size:1.5rem;font-weight:700;color:var(--o)">${trainStreak}</div><div style="font-family:var(--mono);font-size:.55rem;color:var(--t3)">🏋️ Treino</div></div>`;
  h+=`<div style="text-align:center"><div style="font-family:var(--mono);font-size:1.5rem;font-weight:700;color:var(--teal)">${routineStreak}</div><div style="font-family:var(--mono);font-size:.55rem;color:var(--t3)">📋 Rotina</div></div>`;
  h+=`<div style="text-align:center"><div style="font-family:var(--mono);font-size:1.5rem;font-weight:700;color:var(--purple)">${suppStreak}</div><div style="font-family:var(--mono);font-size:.55rem;color:var(--t3)">💊 Suplem.</div></div>`;
  h+=`</div></div>`;

  // Rest warning
  if(trainStreak>=5){
    h+=`<div class="card" style="border-color:var(--o);background:rgba(251,191,36,.05);margin-bottom:16px"><div style="font-family:var(--mono);font-size:.75rem;color:var(--o);font-weight:600">⚠️ Alerta de Descanso</div><div style="font-size:.82rem;color:var(--t2);margin-top:4px">Você treinou ${trainStreak} dias seguidos. Considere um dia de descanso!</div></div>`;
  }

  // Heatmap
  h+=`<div class="card"><div style="font-family:var(--mono);font-size:.7rem;font-weight:600;margin-bottom:10px">📊 Atividade (últimos 90 dias)</div>`;
  h+=`<div class="hm-legend"><span>Menos</span>`;
  [0,1,2,3,4].forEach(l=>{
    const colors=['var(--s3)','#0d3a1a','#135c2a','#1a8040','#4ADE80'];
    h+=`<span style="background:${colors[l]}"></span>`;
  });
  h+=`<span>Mais</span></div>`;
  h+=`<div class="heatmap">`;
  for(let i=89;i>=0;i--){
    const ds2=daysAgo(i);
    const sc=calcScore(ds2);
    const level=sc===0?0:sc<25?1:sc<50?2:sc<75?3:4;
    const colors=['var(--s3)','#0d3a1a','#135c2a','#1a8040','#4ADE80'];
    h+=`<div class="hm-cell" style="background:${colors[level]}" title="${fmtDate(ds2)}: ${sc}pts"></div>`;
  }
  h+=`</div></div>`;

  // Current cycle
  const activeCycle=Object.entries(d.cycles||{}).find(([id,c])=>c.startDate<=ds&&(!c.endDate||c.endDate>=ds));
  if(activeCycle){
    const [cid,c]=activeCycle;
    const weekNum=Math.ceil((daysBetween(c.startDate,ds)+1)/7);
    h+=`<div class="card" style="margin-top:10px"><div style="font-family:var(--mono);font-size:.7rem;font-weight:600;margin-bottom:4px">🔄 Ciclo Atual: ${esc(c.name)}</div><div style="font-size:.78rem;color:var(--t3)">Semana ${weekNum} · ${esc(c.type)}</div></div>`;
  }

  return h;
}

// VIEW: WATER
// ═══════════════════════════════════════════════════════════
function renderWater(){
  const d=D(), ds=todayS(), wt=waterToday(), wGoal=d.settings?.waterGoal||2500;
  const pctVal=Math.min(100,pct(wt.amount,wGoal));
  const circumference=2*Math.PI*85;
  const offset=circumference-(pctVal/100)*circumference;

  let h=`<div class="pg-title">💧 Água <span class="right"><button class="btn-s" onclick="S.modal='waterGoal';R()">Meta: ${wGoal}ml</button></span></div>`;

  // Circle
  h+=`<div class="water-ring"><svg width="200" height="200"><circle cx="100" cy="100" r="85" fill="none" stroke="var(--s3)" stroke-width="10"/><circle cx="100" cy="100" r="85" fill="none" stroke="var(--blue)" stroke-width="10" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset .5s"/></svg><div class="label"><div class="val" style="color:var(--blue)">${wt.amount}</div><div class="sub">de ${wGoal}ml (${pctVal}%)</div></div></div>`;

  // Quick add buttons
  h+=`<div style="display:flex;gap:6px;justify-content:center;margin-bottom:16px;flex-wrap:wrap">`;
  [150,250,500,750].forEach(ml=>{
    h+=`<button class="btn-qk" onclick="addWaterQuick(${ml})">+${ml}ml</button>`;
  });
  h+=`<button class="btn-qk" onclick="S.modal='waterCustom';R()">✏️ Custom</button>`;
  h+=`</div>`;

  // Undo
  if(wt.logs&&wt.logs.length>0){
    h+=`<div style="text-align:center;margin-bottom:16px"><button class="btn-s" onclick="undoWater()" style="font-size:.72rem">↩ Desfazer último (${wt.logs[wt.logs.length-1].ml}ml)</button></div>`;
  }

  // Today's log
  h+=`<div class="card"><div style="font-family:var(--mono);font-size:.7rem;font-weight:600;margin-bottom:8px">Registro de Hoje</div>`;
  if(wt.logs&&wt.logs.length>0){
    wt.logs.slice().reverse().forEach(l=>{
      h+=`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:.82rem;border-bottom:1px solid var(--b1)"><span style="color:var(--t2)">${fmtTime(l.time)}</span><span style="color:var(--blue);font-family:var(--mono)">+${l.ml}ml</span></div>`;
    });
  }else h+=`<div style="color:var(--t3);font-size:.82rem">Nenhum registro ainda</div>`;
  h+=`</div>`;

  // Weekly chart
  h+=`<div class="card"><div style="font-family:var(--mono);font-size:.7rem;font-weight:600;margin-bottom:8px">Últimos 7 dias</div><div class="bar-chart">`;
  for(let i=6;i>=0;i--){
    const ds2=daysAgo(i);
    const w=d.water[ds2];
    const amt=w?w.amount:0;
    const hPct=Math.min(100,pct(amt,wGoal));
    const color=amt>=wGoal?'var(--g)':'var(--blue)';
    h+=`<div class="bar-col"><div class="bar-val">${amt>0?Math.round(amt/1000*10)/10+'L':''}</div><div class="bar-fill" style="height:${Math.max(2,hPct)}%;background:${color}"></div><div class="bar-label">${DAYS_PT[new Date(ds2+'T12:00:00').getDay()].slice(0,3)}</div></div>`;
  }
  h+=`</div></div>`;

  return h;
}

function addWaterQuick(ml){
  const d=D(),ds=todayS();
  if(!d.water[ds])d.water[ds]={amount:0,goal:d.settings?.waterGoal||2500,logs:[]};
  d.water[ds].amount+=ml;
  if(!d.water[ds].logs)d.water[ds].logs=[];
  d.water[ds].logs.push({time:Date.now(),ml});
  save();R();toast(`+${ml}ml adicionado`);
}
function undoWater(){
  const d=D(),ds=todayS();
  if(!d.water[ds]||!d.water[ds].logs||d.water[ds].logs.length===0)return;
  const last=d.water[ds].logs.pop();
  d.water[ds].amount=Math.max(0,d.water[ds].amount-last.ml);
  save();R();toast(`-${last.ml}ml removido`);
}

  // All supplements list
  if(allSupps.length>0){
    h+=`<div style="font-family:var(--mono);font-size:.7rem;font-weight:600;margin:20px 0 10px">Todos os Suplementos (${allSupps.length})</div>`;
    allSupps.forEach(s=>{
      const freqLabel=s.frequency==='daily'?'Diário':s.frequency==='weekly'?'Dias específicos':'Custom';

      if(s.color)h+=`<div style="width:12px;height:12px;border-radius:50%;background:${s.color};flex-shrink:0"></div>`;
      h+=`<div style="flex:1"><div style="font-weight:600;font-size:.88rem">${esc(s.name)}</div><div style="font-size:.72rem;color:var(--t3)">${esc(s.dosage||'')} · ${freqLabel} · ${SUPPLEMENT_TIMES.find(t=>t.id===s.time)?.n||''}</div></div>`;
      h+=`<button class="btn-d" onclick="event.stopPropagation();deleteSupplement('${s.id}')" style="padding:4px 8px;font-size:.65rem">✕</button>`;
      h+=`</div>`;
    });
  }

  return h;

function toggleSupplement(id){

  save();R();
}
function deleteSupplement(id){

}

// VIEW: WEIGHT
// ═══════════════════════════════════════════════════════════
function renderWeight(){
  const d=D(), ds=todayS();
  const entries=Object.entries(d.weight||{}).sort((a,b)=>a[0].localeCompare(b[0]));
  const todayEntry=d.weight[ds]||{};
  const last=entries.length>0?entries[entries.length-1]:null;
  const prevLast=entries.length>1?entries[entries.length-2]:null;

  let h=`<div class="pg-title">⚖️ Peso & Medidas <span class="right"><button class="btn-p" onclick="S.modal='logWeight';R()">+ Registrar</button></span></div>`;

  // Current stats
  if(last){
    const trend=prevLast?((last[1].weight||0)-(prevLast[1].weight||0)):0;
    const trendClass=trend>0?'trend-up':trend<0?'trend-down':'trend-same';
    const trendIcon=trend>0?'↑':trend<0?'↓':'→';
    h+=`<div class="card-grid">`;
    h+=`<div class="card-sm"><div class="card-label">Peso Atual</div><div class="card-val">${last[1].weight||'—'}kg</div><div class="card-sub ${trendClass}">${trendIcon} ${Math.abs(trend).toFixed(1)}kg desde ${fmtDate(prevLast?prevLast[0]:'')}</div></div>`;
    if(last[1].bodyFat)h+=`<div class="card-sm"><div class="card-label">Gordura Corporal</div><div class="card-val">${last[1].bodyFat}%</div></div>`;
    if(last[1].muscle)h+=`<div class="card-sm"><div class="card-label">Massa Muscular</div><div class="card-val">${last[1].muscle}%</div></div>`;
    h+=`</div>`;
  }

  // Chart
  const range=parseInt(S.weightChartRange)||30;
  h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-family:var(--mono);font-size:.7rem;font-weight:600">Evolução do Peso</div>`;
  h+=`<div class="tabs" style="margin:0"><button class="tab-btn${range===30?' on':''}" onclick="S.weightChartRange='30';R()">30d</button><button class="tab-btn${range===90?' on':''}" onclick="S.weightChartRange='90';R()">90d</button><button class="tab-btn${range===365?' on':''}" onclick="S.weightChartRange='365';R()">Tudo</button></div></div>`;
  const filtered=entries.filter(([k])=>daysBetween(k,todayS())<=range&&daysBetween(k,todayS())>=0);
  if(filtered.length>1){
    const weights=filtered.map(([k,v])=>v.weight).filter(Boolean);
    const minW=Math.min(...weights)-2;
    const maxW=Math.max(...weights)+2;
    const rangeW=maxW-minW||1;
    h+=`<div class="bar-chart" style="height:150px">`;
    filtered.forEach(([k,v])=>{
      if(!v.weight)return;
      const hPct=((v.weight-minW)/rangeW)*100;
      h+=`<div class="bar-col" title="${fmtDate(k)}: ${v.weight}kg"><div class="bar-val">${v.weight}</div><div class="bar-fill" style="height:${hPct}%;background:var(--g)"></div><div class="bar-label">${k.slice(8)}</div></div>`;
    });
    h+=`</div>`;
  }else h+=`<div style="color:var(--t3);font-size:.82rem;padding:20px 0;text-align:center">Registre mais dados para ver o gráfico</div>`;
  h+=`</div>`;

  // Body fat chart
  const bfEntries=entries.filter(([k,v])=>v.bodyFat);
  if(bfEntries.length>1){
    h+=`<div class="card"><div style="font-family:var(--mono);font-size:.7rem;font-weight:600;margin-bottom:10px">Evolução % Gordura</div>`;
    const bfs=bfEntries.map(([k,v])=>v.bodyFat);
    const minBf=Math.min(...bfs)-2;const maxBf=Math.max(...bfs)+2;const rangeBf=maxBf-minBf||1;
    h+=`<div class="bar-chart" style="height:100px">`;
    bfEntries.slice(-15).forEach(([k,v])=>{
      const hPct=((v.bodyFat-minBf)/rangeBf)*100;
      h+=`<div class="bar-col"><div class="bar-val">${v.bodyFat}%</div><div class="bar-fill" style="height:${hPct}%;background:var(--o)"></div><div class="bar-label">${k.slice(8)}</div></div>`;
    });
    h+=`</div></div>`;
  }

  // Photos
  h+=`<div class="card"><div style="font-family:var(--mono);font-size:.7rem;font-weight:600;margin-bottom:10px">📸 Fotos de Progresso</div>`;
  h+=`<div><input type="file" accept="image/*" onchange="addProgressPhoto(event)" style="font-size:.78rem;color:var(--t2)"></div>`;
  const photos=JSON.parse(localStorage.getItem('health_photos')||'{}');
  const photoKeys=Object.keys(photos).sort().reverse();
  if(photoKeys.length>0){
    h+=`<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">`;
    photoKeys.forEach(k=>{
      h+=`<div style="position:relative"><img src="${photos[k]}" style="width:100px;height:100px;object-fit:cover;border-radius:var(--rad);border:1px solid var(--b1)"><div style="font-family:var(--mono);font-size:.5rem;color:var(--t3);text-align:center">${fmtDate(k)}</div><button onclick="deletePhoto('${k}')" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,.7);color:var(--r);border-radius:50%;width:18px;height:18px;font-size:.6rem;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none">✕</button></div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;

function renderGoals(){
  const d=D();
  const goals=Object.entries(d.goals||{}).map(([id,g])=>({id,...g}));
  const active=goals.filter(g=>g.active!==false);
  const archived=goals.filter(g=>g.active===false);

  let h=`<div class="pg-title">🎯 Metas <span class="right"><button class="btn-p" onclick="S.modal='newGoal';R()">+ Meta</button></span></div>`;

  if(active.length===0&&archived.length===0)h+=`<div class="empty"><p>Nenhuma meta criada</p></div>`;

  active.forEach(g=>{
    const progress=calcGoalProgress(g);
    h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-weight:600;font-size:.9rem">${esc(g.title)}</div>`;
    h+=`<div style="display:flex;gap:4px">`;
    if(progress>=100)h+=`<button class="btn-s" style="font-size:.65rem;padding:3px 8px;color:var(--g)" onclick="archiveGoal('${g.id}')">✓ Concluído</button>`;
    h+=`<button class="ck-del" style="opacity:1" onclick="deleteGoal('${g.id}')">✕</button></div></div>`;
    h+=`<div class="prog"><div class="prog-fill green" style="width:${Math.min(100,progress)}%"></div></div>`;
    h+=`<div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:.62rem;color:var(--t3)"><span>${progress}% completo</span>`;
    if(g.deadline)h+=`<span>Prazo: ${fmtDate(g.deadline)}</span>`;
    h+=`</div></div>`;
  });

  if(archived.length>0){
    h+=`<div style="font-family:var(--mono);font-size:.7rem;font-weight:600;color:var(--t3);margin:16px 0 8px">Arquivadas</div>`;
    archived.forEach(g=>{
      h+=`<div class="card" style="opacity:.5"><div style="font-weight:600;font-size:.88rem">${esc(g.title)} ✓</div></div>`;
    });
  }

  return h;
}

function calcGoalProgress(g){
  const d=D();
  if(g.type==='water'){
    const streak=calcStreak(ds=>{const w=d.water[ds];return w&&w.amount>=(d.settings?.waterGoal||2500)});
    return Math.min(100,Math.round((streak/(g.target||7))*100));
  }
  if(g.type==='workout'){
    const now=new Date();const monthKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
    const cnt=Object.values(d.workouts||{}).filter(w=>w.completed&&w.date&&w.date.startsWith(monthKey)).length;
    return Math.min(100,Math.round((cnt/(g.target||10))*100));
  }
  if(g.type==='weight'){
    const entries=Object.entries(d.weight||{}).sort((a,b)=>b[0].localeCompare(a[0]));
    if(entries.length===0)return 0;
    const current=entries[0][1].weight;
    const first=entries[entries.length-1][1].weight;
    if(!current||!g.target)return 0;
    const totalDiff=Math.abs(first-g.target);
    const currentDiff=Math.abs(current-g.target);
    return totalDiff>0?Math.min(100,Math.round(((totalDiff-currentDiff)/totalDiff)*100)):100;
  }
  return 0;
}

function deleteGoal(id){delete D().goals[id];save();R();toast('Meta removida')}

  let h=`<div class="pg-title">📊 Relatórios</div>`;
  h+=`<div class="tabs"><button class="tab-btn${S.reportTab==='week'?' on':''}" onclick="S.reportTab='week';R()">Semana</button><button class="tab-btn${S.reportTab==='month'?' on':''}" onclick="S.reportTab='month';R()">Mês</button></div>`;

  h+=`<div style="font-family:var(--mono);font-size:.7rem;font-weight:600;margin-bottom:10px">${label}</div>`;
  h+=`<div class="card-grid">`;

  // Avg water
  const awDiff=curStats.avgWater-prevStats.avgWater;
  h+=`<div class="card-sm"><div class="card-label">Média Água</div><div class="card-val">${curStats.avgWater}ml</div><div class="card-sub ${awDiff>0?'trend-up':awDiff<0?'trend-down':'trend-same'}">${awDiff>0?'↑':awDiff<0?'↓':'→'} ${Math.abs(awDiff)}ml</div></div>`;
  // Weight change
  h+=`<div class="card-sm"><div class="card-label">Var. Peso</div><div class="card-val">${curStats.weightChange>0?'+':''}${curStats.weightChange}kg</div></div>`;
  // Mood avg
  h+=`<div class="card-sm"><div class="card-label">Humor Médio</div><div class="card-val">${curStats.avgMood>0?MOOD_EMOJIS[Math.round(curStats.avgMood)-1]?.e||'—':'—'}</div><div class="card-sub">${curStats.avgMood.toFixed(1)}/5</div></div>`;
  // Supplement compliance
  const scDiff=curStats.suppCompliance-prevStats.suppCompliance;
  h+=`<div class="card-sm"><div class="card-label">Suplementos</div><div class="card-val">${curStats.suppCompliance}%</div><div class="card-sub ${scDiff>0?'trend-up':scDiff<0?'trend-down':'trend-same'}">${scDiff>0?'↑':scDiff<0?'↓':'→'} ${Math.abs(scDiff)}%</div></div>`;
  // Routine compliance
  const rcDiff=curStats.routineCompliance-prevStats.routineCompliance;
  h+=`<div class="card-sm"><div class="card-label">Rotina</div><div class="card-val">${curStats.routineCompliance}%</div><div class="card-sub ${rcDiff>0?'trend-up':rcDiff<0?'trend-down':'trend-same'}">${rcDiff>0?'↑':rcDiff<0?'↓':'→'} ${Math.abs(rcDiff)}%</div></div>`;
  h+=`</div>`;

  // Score chart
  h+=`<div class="card"><div style="font-family:var(--mono);font-size:.7rem;font-weight:600;margin-bottom:10px">Score Diário</div>`;
  h+=`<div class="bar-chart">`;
  for(let i=days-1;i>=0;i--){
    const ds=daysAgo(i);
    const sc=calcScore(ds);
    const color=sc>=70?'var(--g)':sc>=40?'var(--o)':'var(--r)';
    h+=`<div class="bar-col"><div class="bar-val">${sc>0?sc:''}</div><div class="bar-fill" style="height:${sc}%;background:${color}"></div><div class="bar-label">${ds.slice(8)}</div></div>`;
  }
  h+=`</div></div>`;

  // Rest/train ratio
  let trainDays=0,restDays=0;
  for(let i=0;i<days;i++){
    if(Object.values(d.workouts||{}).some(w=>w.date===daysAgo(i)&&w.completed))trainDays++;
    else restDays++;
  }
  h+=`<div class="card"><div style="font-family:var(--mono);font-size:.7rem;font-weight:600;margin-bottom:6px">Treino vs Descanso</div>`;
  h+=`<div style="display:flex;gap:16px"><div><span style="font-family:var(--mono);font-size:1.2rem;font-weight:700;color:var(--o)">${trainDays}</span><span style="font-size:.72rem;color:var(--t3)"> dias treino</span></div>`;
  h+=`<div><span style="font-family:var(--mono);font-size:1.2rem;font-weight:700;color:var(--teal)">${restDays}</span><span style="font-size:.72rem;color:var(--t3)"> dias descanso</span></div></div></div>`;

  return h;
}

function calcPeriodStats(offsetDays,numDays){
  const d=D();
  let workouts=0,totalWater=0,waterDays=0,moodSum=0,moodDays=0,suppTotal=0,suppDone=0,routineTotal=0,routineDone=0;
  let firstWeight=null,lastWeight=null;

  for(let i=0;i<numDays;i++){
    const ds=daysAgo(offsetDays+i);
    // Workouts
    if(Object.values(d.workouts||{}).some(w=>w.date===ds&&w.completed))workouts++;
    // Water
    const w=d.water[ds];
    if(w&&w.amount>0){totalWater+=w.amount;waterDays++}
    // Mood
    const m=d.mood[ds];
    if(m){moodSum+=m.value;moodDays++}
    // Supplements
    const supps=Object.keys(d.supplements||{});
    const sLog=d.supplementLog[ds]||{};
    suppTotal+=supps.length;
    suppDone+=supps.filter(id=>sLog[id]).length;
    // Routine
    const rItems=Object.keys(d.routine?.items||{});
    const rLog=d.routineLog[ds]||{};
    routineTotal+=rItems.length;
    routineDone+=rItems.filter(id=>rLog[id]).length;
    // Weight
    const wt=d.weight[ds];
    if(wt&&wt.weight){
      if(!firstWeight)firstWeight=wt.weight;
      lastWeight=wt.weight;
    }
  }

  return{
    workouts,
    avgWater:waterDays>0?Math.round(totalWater/waterDays):0,
    avgMood:moodDays>0?moodSum/moodDays:0,
    suppCompliance:suppTotal>0?Math.round((suppDone/suppTotal)*100):0,
    routineCompliance:routineTotal>0?Math.round((routineDone/routineTotal)*100):0,
    weightChange:firstWeight&&lastWeight?Math.round((lastWeight-firstWeight)*10)/10:0
  };
}

    const score=calcScore(ds);
    h+=`<div style="margin-bottom:8px">Score: <span style="font-family:var(--mono);font-weight:700;color:${score>=70?'var(--g)':score>=40?'var(--o)':'var(--r)'}">${score}</span>/100</div>`;

    // Water
    const w=d.water[ds];
    if(w)h+=`<div style="font-size:.82rem;margin-bottom:4px">💧 Água: ${w.amount}ml</div>`;
    // Workout
    const wks=workoutsForDate(ds);
    wks.forEach(w=>h+=`<div style="font-size:.82rem;margin-bottom:4px">🏋️ ${esc(w.title||w.type)}${w.completed?' ✓':''}</div>`);
    // Mood
    const mood=d.mood[ds];
    if(mood)h+=`<div style="font-size:.82rem;margin-bottom:4px">😊 ${MOOD_EMOJIS.find(e=>e.v===mood.value)?.e||''} ${MOOD_EMOJIS.find(e=>e.v===mood.value)?.l||''}</div>`;
    // Supplements
    const sLog=d.supplementLog[ds]||{};
    const suppsDone=Object.keys(sLog).filter(k=>sLog[k]).length;
    if(suppsDone>0)h+=`<div style="font-size:.82rem;margin-bottom:4px">💊 ${suppsDone} suplementos tomados</div>`;
    // Meals
    const meals=d.meals[ds]||[];
    meals.forEach(m=>h+=`<div style="font-size:.82rem;margin-bottom:4px">🍽️ ${MEAL_TYPES.find(t=>t.id===m.time)?.n||''}: ${esc(m.description)}</div>`);
    // Symptoms
    (d.symptoms[ds]||[]).forEach(s=>h+=`<div style="font-size:.82rem;margin-bottom:4px">🤒 ${esc(s.description)} (${s.bodyPart})</div>`);
    // Weight
    if(d.weight[ds])h+=`<div style="font-size:.82rem;margin-bottom:4px">⚖️ ${d.weight[ds].weight}kg</div>`;

    h+=`</div>`;
  }

  return h;
}

function changeHistMonth(delta){

  if(bpEntries.length>1){

    h+=`<div class="bar-chart" style="height:100px">`;

  exams.forEach(e=>{
    h+=`<div class="card" style="cursor:pointer" onclick="S.modal='viewExam';S._examId='${e.id}';R()">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center"><div style="font-weight:600;font-size:.9rem">${esc(e.name)}</div>`;
    h+=`<div style="display:flex;gap:6px;align-items:center"><span style="font-family:var(--mono);font-size:.62rem;color:var(--t3)">${fmtDate(e.date)}</span>`;
    h+=`<button class="ck-del" style="opacity:1" onclick="event.stopPropagation();deleteExam('${e.id}')">✕</button></div></div>`;
    if(e.results&&e.results.length>0){
      h+=`<div style="margin-top:6px;font-size:.75rem;color:var(--t3)">${e.results.length} resultados</div>`;
    }
    if(e.notes)h+=`<div style="margin-top:4px;font-size:.78rem;color:var(--t2)">${esc(e.notes).slice(0,80)}</div>`;
    h+=`</div>`;
  });

  return h;
}

function saveBP(field,value){
  const d=D(),ds=todayS();
  if(!d.bloodPressure)d.bloodPressure={};
  if(!d.bloodPressure[ds])d.bloodPressure[ds]={};
  d.bloodPressure[ds][field]=value;
  save();
}

    h+=`<span>${fmtDate(active.startDate)}${active.endDate?' → '+fmtDate(active.endDate):''}</span>`;
    h+=`</div>`;
    if(active.notes)h+=`<div style="margin-top:6px;font-size:.82rem;color:var(--t2)">${esc(active.notes)}</div>`;
    h+=`</div>`;
  }

  // Timeline
  h+=`<div style="font-family:var(--mono);font-size:.7rem;font-weight:600;margin-bottom:10px">Todos os Ciclos</div>`;
  if(cycles.length===0)h+=`<div class="empty"><p>Nenhum ciclo criado</p></div>`;
  h+=`<div class="timeline">`;
  cycles.forEach(c=>{
    const isActive=c.startDate<=ds&&(!c.endDate||c.endDate>=ds);
    const ct=CYCLE_TYPES.find(t=>t.id===c.type);
    h+=`<div class="tl-item${isActive?' active':''}">`;
    h+=`<div class="tl-date">${fmtDate(c.startDate)}${c.endDate?' → '+fmtDate(c.endDate):''}</div>`;
    h+=`<div class="tl-title">${esc(c.name)} <span style="font-size:.72rem;color:var(--t3)">(${ct?.n||c.type})</span></div>`;
    if(c.notes)h+=`<div class="tl-desc">${esc(c.notes)}</div>`;
    h+=`<button style="font-size:.65rem;color:var(--t3);margin-top:4px;cursor:pointer;background:none;border:none" onclick="deleteCycle('${c.id}')">Remover</button>`;
    h+=`</div>`;
  });
  h+=`</div>`;

  return h;
}

// ═══════════════════════════════════════════════════════════
function renderNotes(){
  const d=D();
  const notes=Object.entries(d.notes||{}).sort((a,b)=>(b[1].date||'').localeCompare(a[1].date||'')).map(([id,n])=>({id,...n}));
  const tags=Object.entries(d.tags||{}).map(([id,t])=>({id,...t}));

  let h=`<div class="pg-title">📝 Notas <span class="right">`;
  h+=`<button class="btn-s" onclick="S.modal='manageTags';R()">🏷️ Tags</button>`;
  h+=`<button class="btn-p" onclick="S.modal='newNote';R()">+ Nota</button></span></div>`;

  // Search
  h+=`<div class="search-bar"><span style="color:var(--t3)">🔍</span><input type="text" placeholder="Buscar notas..." oninput="S._noteSearch=this.value;R()"></div>`;

  // Filter by source
  h+=`<div style="display:flex;gap:4px;margin-bottom:12px">`;
  h+=`<button class="chip${!S._noteFilter?' on':''}" onclick="S._noteFilter=null;R()">Todas</button>`;
  NOTE_SOURCES.forEach(src=>{
    h+=`<button class="chip${S._noteFilter===src.id?' on':''}" onclick="S._noteFilter='${src.id}';R()">${src.n}</button>`;
  });
  h+=`</div>`;

  let filtered=notes;
  if(S._noteFilter)filtered=filtered.filter(n=>n.source===S._noteFilter);
  if(S._noteSearch)filtered=filtered.filter(n=>(n.content||'').toLowerCase().includes(S._noteSearch.toLowerCase()));

  if(filtered.length===0)h+=`<div class="empty"><p>Nenhuma nota encontrada</p></div>`;
  filtered.forEach(n=>{
    const src=NOTE_SOURCES.find(s=>s.id===n.source);
    h+=`<div class="card" style="cursor:pointer" onclick="S.modal='editNote';S._editNoteId='${n.id}';R()">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">`;
    h+=`<div style="display:flex;gap:6px;align-items:center">`;
    if(src)h+=`<span class="tag-pill" style="background:${src.c}22;color:${src.c}">${src.n}</span>`;
    h+=`<span style="font-family:var(--mono);font-size:.6rem;color:var(--t3)">${fmtDate(n.date)}</span></div>`;
    h+=`<button class="ck-del" style="opacity:1" onclick="event.stopPropagation();deleteNote('${n.id}')">✕</button></div>`;
    // Render content with bold
    let content=esc(n.content||'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    h+=`<div style="font-size:.85rem;color:var(--t2);line-height:1.5">${content}</div>`;
    // Tags
    if(n.tags&&n.tags.length>0){
      h+=`<div style="display:flex;gap:4px;margin-top:6px">`;
      n.tags.forEach(tid=>{
        const tag=tags.find(t=>t.id===tid);
        if(tag)h+=`<span class="tag-pill" style="background:${tag.color}22;color:${tag.color}">${esc(tag.name)}</span>`;
      });
      h+=`</div>`;
    }
    h+=`</div>`;
  });

  return h;
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(D(),null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='vidaflow-backup-'+todayS()+'.json';a.click();
  URL.revokeObjectURL(url);toast('Exportado com sucesso');
}
function exportCSV(){
  let csv='Data,Score,Água(ml),Peso(kg),Humor,Treinos,Suplementos(%)\n';
  for(let i=90;i>=0;i--){
    const ds=daysAgo(i);
    const d=D();
    const score=calcScore(ds);
    const water=(d.water[ds]?.amount)||0;
    const weight=(d.weight[ds]?.weight)||'';
    const mood=(d.mood[ds]?.value)||'';
    const workouts=Object.values(d.workouts||{}).filter(w=>w.date===ds&&w.completed).length;
    const supps=Object.keys(d.supplements||{});
    const sLog=d.supplementLog[ds]||{};
    const suppPct=supps.length>0?Math.round((supps.filter(id=>sLog[id]).length/supps.length)*100):0;
    csv+=`${ds},${score},${water},${weight},${mood},${workouts},${suppPct}\n`;
  }
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='vidaflow-'+todayS()+'.csv';a.click();
  URL.revokeObjectURL(url);toast('CSV exportado');
}
function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      S.data={...defaultData(),...data};
      save();R();toast('Dados importados com sucesso!');
    }catch(err){toast('Erro ao importar: '+err.message,'err')}
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════════════════════
// FOCUS MODE (WORKOUT)
// ═══════════════════════════════════════════════════════════
function renderFocusMode(){
  const fm=S.focusMode;
  if(!fm)return'';
  const workout=D().workouts[fm.workoutId];
  if(!workout)return'';
  const exercises=workout.exercises||[];
  const curEx=exercises[fm.currentExercise]||null;

  let h=`<div class="focus-mode"><div class="fm-top"><button class="btn-s" onclick="exitFocusMode()">← Sair</button><div style="font-weight:700">${esc(workout.title||'Treino')}</div><div style="font-family:var(--mono);font-size:.72rem;color:var(--t3)">${fm.currentExercise+1}/${exercises.length}</div></div>`;

  // Timer
  h+=`<div class="fm-timer">${fmtTimer(S.focusTimer)}</div>`;

  // Rest timer
  if(S.restTimer>0){
    h+=`<div class="fm-rest">Descanso: ${fmtTimer(S.restTimer)}</div>`;
  }

  if(curEx){
    h+=`<div class="fm-exercise"><div style="font-weight:700;font-size:1.1rem;margin-bottom:12px;text-align:center">${esc(curEx.name)}</div>`;
    // Sets
    const sets=parseInt(curEx.sets)||3;
    for(let s=0;s<sets;s++){
      const done=fm.doneSets&&fm.doneSets[fm.currentExercise]&&fm.doneSets[fm.currentExercise][s];
      h+=`<div class="fm-set-row${done?' done':''}" onclick="toggleFocusSet(${s})">`;
      h+=`<div class="ck-box${done?' on':''}">✓</div>`;
      h+=`<div style="flex:1;font-family:var(--mono);font-size:.82rem">Set ${s+1}</div>`;
      h+=`<div style="font-family:var(--mono);font-size:.78rem;color:var(--t3)">${curEx.reps||'—'} reps × ${curEx.weight||'—'}kg</div>`;
      h+=`</div>`;
    }
    h+=`</div>`;

    // Rest button
    h+=`<div style="display:flex;gap:8px;margin-top:16px;justify-content:center">`;
    h+=`<button class="btn-s" onclick="startRestTimer(60)">⏱ Descanso 60s</button>`;
    h+=`<button class="btn-s" onclick="startRestTimer(90)">⏱ 90s</button>`;
    h+=`<button class="btn-s" onclick="startRestTimer(120)">⏱ 120s</button>`;
    h+=`</div>`;

    // Nav
    h+=`<div style="display:flex;gap:8px;margin-top:16px;justify-content:center">`;
    if(fm.currentExercise>0)h+=`<button class="btn-s" onclick="S.focusMode.currentExercise--;R()">← Anterior</button>`;
    if(fm.currentExercise<exercises.length-1)h+=`<button class="btn-p" onclick="S.focusMode.currentExercise++;R()">Próximo →</button>`;
    else h+=`<button class="btn-p" onclick="completeFocusWorkout()">✓ Finalizar</button>`;
    h+=`</div>`;
  }

  h+=`</div>`;
  return h;
}

function startFocusMode(workoutId){
  S.focusMode={workoutId,currentExercise:0,doneSets:{}};
  S.focusTimer=0;
  S.focusInterval=setInterval(()=>{S.focusTimer++;const el=document.querySelector('.fm-timer');if(el)el.textContent=fmtTimer(S.focusTimer)},1000);
  R();
}
function exitFocusMode(){
  clearInterval(S.focusInterval);clearInterval(S.restInterval);
  S.focusMode=null;S.focusTimer=0;S.restTimer=0;R();
}
function toggleFocusSet(setIndex){
  const fm=S.focusMode;
  if(!fm.doneSets[fm.currentExercise])fm.doneSets[fm.currentExercise]={};
  fm.doneSets[fm.currentExercise][setIndex]=!fm.doneSets[fm.currentExercise][setIndex];
  R();
}
function startRestTimer(secs){
  clearInterval(S.restInterval);
  S.restTimer=secs;
  S.restInterval=setInterval(()=>{
    S.restTimer--;
    const el=document.querySelector('.fm-rest');
    if(el)el.textContent='Descanso: '+fmtTimer(S.restTimer);
    if(S.restTimer<=0){clearInterval(S.restInterval);R()}
  },1000);
  R();
}
function completeFocusWorkout(){
  const fm=S.focusMode;
  if(!fm)return;
  const d=D();
  d.workouts[fm.workoutId].completed=true;
  d.workouts[fm.workoutId].duration=Math.round(S.focusTimer/60);
  // Check PRs
  const workout=d.workouts[fm.workoutId];
  (workout.exercises||[]).forEach(ex=>{
    if(ex.weight&&parseFloat(ex.weight)>0){
      const existingPRs=Object.values(d.prs||{}).filter(p=>p.exercise===ex.name);
      const maxPR=existingPRs.length>0?Math.max(...existingPRs.map(p=>parseFloat(p.value)||0)):0;
      if(parseFloat(ex.weight)>maxPR){
        const prId=uid();
        d.prs[prId]={exercise:ex.name,value:ex.weight,unit:'kg',date:todayS(),previous:maxPR>0?maxPR:null};
        toast(`🏆 Novo PR em ${ex.name}: ${ex.weight}kg!`);
        confetti();
      }
    }
  });
  save();exitFocusMode();toast('Treino completo! 💪');
}

function renderModal(){
  if(!S.modal)return'';
  let content='';
  switch(S.modal){
    case 'waterGoal':content=modalWaterGoal();break;
    case 'waterCustom':content=modalWaterCustom();break;

function addExerciseRow(){
  const container=document.getElementById('m-wexercises');
  if(!container)return;
  const lib=Object.entries(D().exerciseLibrary||{}).map(([id,e])=>({id,...e}));
  const row=document.createElement('div');
  row.style.cssText='display:flex;gap:4px;margin-bottom:4px;align-items:center';
  row.innerHTML=`<input class="fi fi-sm ex-name" placeholder="Nome" style="flex:2" list="ex-list"><input class="fi fi-sm ex-sets" type="number" placeholder="Sets" style="flex:1"><input class="fi fi-sm ex-reps" type="number" placeholder="Reps" style="flex:1"><input class="fi fi-sm ex-weight" type="number" placeholder="Kg" style="flex:1" step="0.5"><button onclick="this.parentElement.remove()" style="color:var(--r);font-size:.72rem;cursor:pointer;background:none;border:none">✕</button>`;
  container.appendChild(row);
  // Datalist for exercise names
  if(!document.getElementById('ex-list')){
    const dl=document.createElement('datalist');
    dl.id='ex-list';
    lib.forEach(e=>{const o=document.createElement('option');o.value=e.name;dl.appendChild(o)});
    document.body.appendChild(dl);
  }
}

function applyTemplate(){
  const sel=document.getElementById('m-wtemplate');
  if(!sel||!sel.value)return;
  const template=D().workoutTemplates[sel.value];
  if(!template)return;
  const container=document.getElementById('m-wexercises');
  container.innerHTML='';
  (template.exercises||[]).forEach(ex=>{
    addExerciseRow();
    const rows=container.children;
    const lastRow=rows[rows.length-1];
    const exData=D().exerciseLibrary[ex.exerciseId];
    lastRow.querySelector('.ex-name').value=exData?.name||ex.exerciseId;
    lastRow.querySelector('.ex-sets').value=ex.sets||'';
    lastRow.querySelector('.ex-reps').value=ex.reps||'';
    lastRow.querySelector('.ex-weight').value=ex.weight||'';
  });
}

function saveNewWorkout(){
  const title=document.getElementById('m-wtitle').value.trim();
  const type=document.getElementById('m-wtype').value;
  const date=document.getElementById('m-wdate').value;
  const dur=document.getElementById('m-wdur').value;
  const notes=document.getElementById('m-wnotes').value;
  const cycleEl=document.getElementById('m-wcycle');
  const cycleId=cycleEl?cycleEl.value:'';

  const exercises=[];
  document.querySelectorAll('#m-wexercises > div').forEach(row=>{
    const name=row.querySelector('.ex-name')?.value?.trim();
    if(name)exercises.push({name,sets:row.querySelector('.ex-sets')?.value||'3',reps:row.querySelector('.ex-reps')?.value||'10',weight:row.querySelector('.ex-weight')?.value||'',done:false});
  });

  const d=D();
  const id=uid();
  d.workouts[id]={title:title||type,type,date,duration:dur?parseInt(dur):null,notes,exercises,completed:false,cycleId:cycleId||null};
  save();closeModal();toast('Treino criado');
}

function updateSupplement(id){

  MEAL_TYPES.forEach(t=>h+=`<option value="${t.id}">${t.n}</option>`);
  h+=`</select></div>`;
  h+=`<div class="fg"><label class="fl">Descrição</label><textarea class="fi" id="m-mdesc" rows="3" placeholder="O que você comeu?"></textarea></div>`;
  h+=`<div class="ma"><button class="btn-s" onclick="closeModal()">Cancelar</button><button class="btn-p" onclick="saveNewMeal()">Salvar</button></div>`;
  return h;
}

function saveNewMeal(){
  const desc=document.getElementById('m-mdesc').value.trim();
  if(!desc)return toast('Descrição é obrigatória','err');
  const d=D(),ds=todayS();
  if(!d.meals[ds])d.meals[ds]=[];
  d.meals[ds].push({id:uid(),time:document.getElementById('m-mtype').value,description:desc});
  save();closeModal();toast('Refeição registrada');
}

function modalNewSymptom(){
  let h=`<h3>Registrar Sintoma</h3>`;
  h+=`<div class="fg"><label class="fl">Descrição</label><input class="fi" id="m-symdesc" placeholder="Dor de cabeça"></div>`;
  h+=`<div class="fg"><label class="fl">Parte do Corpo</label><select class="fi" id="m-symbody">`;
  BODY_PARTS.forEach(p=>h+=`<option value="${p}">${p}</option>`);
  h+=`</select></div>`;
  h+=`<div class="fg"><label class="fl">Severidade (1-5)</label><div class="chip-row" id="m-symsev">`;
  [1,2,3,4,5].forEach(v=>h+=`<button class="chip severity-${v}" data-v="${v}" onclick="document.querySelectorAll('#m-symsev .chip').forEach(c=>c.classList.remove('on'));this.classList.add('on')">${'●'.repeat(v)}</button>`);
  h+=`</div></div>`;
  h+=`<div class="ma"><button class="btn-s" onclick="closeModal()">Cancelar</button><button class="btn-p" onclick="saveNewSymptom()">Salvar</button></div>`;
  return h;
}

function saveNewSymptom(){
  const desc=document.getElementById('m-symdesc').value.trim();
  if(!desc)return toast('Descrição é obrigatória','err');
  const sevEl=document.querySelector('#m-symsev .chip.on');
  const d=D(),ds=todayS();
  if(!d.symptoms[ds])d.symptoms[ds]=[];
  d.symptoms[ds].push({id:uid(),description:desc,bodyPart:document.getElementById('m-symbody').value,severity:sevEl?parseInt(sevEl.dataset.v):1,time:Date.now()});
  save();closeModal();toast('Sintoma registrado');
}

function modalNewGoal(){
  let h=`<h3>Nova Meta</h3>`;
  h+=`<div class="fg"><label class="fl">Título</label><input class="fi" id="m-gtitle" placeholder="Ex: Beber 2.5L por 30 dias"></div>`;
  h+=`<div class="fg"><label class="fl">Tipo</label><select class="fi" id="m-gtype"><option value="water">Água diária</option><option value="workout">Treinos por mês</option><option value="weight">Peso alvo</option><option value="custom">Customizado</option></select></div>`;
  h+=`<div class="fg"><label class="fl">Valor Alvo</label><input class="fi" type="number" id="m-gtarget" placeholder="30"></div>`;
  h+=`<div class="fg"><label class="fl">Unidade</label><input class="fi" id="m-gunit" placeholder="dias, kg, treinos"></div>`;
  h+=`<div class="fg"><label class="fl">Prazo</label><input class="fi" type="date" id="m-gdeadline"></div>`;
  h+=`<div class="ma"><button class="btn-s" onclick="closeModal()">Cancelar</button><button class="btn-p" onclick="saveNewGoal()">Salvar</button></div>`;
  return h;
}

function saveNewGoal(){
  const title=document.getElementById('m-gtitle').value.trim();
  if(!title)return toast('Título é obrigatório','err');
  const d=D();
  d.goals[uid()]={title,type:document.getElementById('m-gtype').value,target:parseFloat(document.getElementById('m-gtarget').value)||0,unit:document.getElementById('m-gunit').value,deadline:document.getElementById('m-gdeadline').value,active:true};
  save();closeModal();toast('Meta criada');
}

function modalBadgeDetail(){
  const b=BADGES_DEF.find(x=>x.id===S._badgeId);
  if(!b)return'<h3>Badge não encontrada</h3>';
  const data=D().badges?.[b.id];
  const isUnlocked=data?.unlocked;
  let h=`<div style="text-align:center;padding:20px"><div style="font-size:4rem;margin-bottom:12px${isUnlocked?'':';filter:grayscale(1);opacity:.3'}">${b.icon}</div>`;
  h+=`<h3 style="margin-bottom:8px">${b.name}</h3>`;
  h+=`<div style="font-size:.85rem;color:var(--t2);margin-bottom:8px">${b.desc}</div>`;
  if(isUnlocked)h+=`<div style="font-family:var(--mono);font-size:.65rem;color:var(--g)">✓ Desbloqueada em ${fmtDate(data.date)}</div>`;
  else h+=`<div style="font-family:var(--mono);font-size:.65rem;color:var(--t3)">🔒 Não desbloqueada</div>`;
  h+=`</div><div class="ma"><button class="btn-s" onclick="closeModal()">Fechar</button></div>`;
  return h;
}

function modalNewExam(){
  let h=`<h3>Novo Exame</h3>`;
  h+=`<div class="fg"><label class="fl">Nome do Exame</label><input class="fi" id="m-ename" placeholder="Hemograma Completo"></div>`;
  h+=`<div class="fg"><label class="fl">Data</label><input class="fi" type="date" id="m-edate" value="${todayS()}"></div>`;
  h+=`<div class="fg"><label class="fl">Resultados</label><div id="m-eresults"></div>`;
  h+=`<button class="btn-s" onclick="addExamResultRow()" style="margin-top:6px;font-size:.72rem">+ Resultado</button></div>`;
  h+=`<div class="fg"><label class="fl">Observações</label><textarea class="fi" id="m-enotes" rows="2"></textarea></div>`;
  h+=`<div class="ma"><button class="btn-s" onclick="closeModal()">Cancelar</button><button class="btn-p" onclick="saveNewExam()">Salvar</button></div>`;
  setTimeout(()=>addExamResultRow(),50);
  return h;
}

function addExamResultRow(){
  const container=document.getElementById('m-eresults');
  if(!container)return;
  const row=document.createElement('div');
  row.style.cssText='display:flex;gap:4px;margin-bottom:4px';
  row.innerHTML=`<input class="fi fi-sm er-label" placeholder="Nome" style="flex:2"><input class="fi fi-sm er-value" placeholder="Valor" style="flex:1"><input class="fi fi-sm er-unit" placeholder="Unit" style="flex:1"><input class="fi fi-sm er-ref" placeholder="Ref" style="flex:1"><button onclick="this.parentElement.remove()" style="color:var(--r);font-size:.72rem;cursor:pointer;background:none;border:none">✕</button>`;
  container.appendChild(row);
}

function saveNewExam(){
  const name=document.getElementById('m-ename').value.trim();
  if(!name)return toast('Nome é obrigatório','err');
  const results=[];
  document.querySelectorAll('#m-eresults > div').forEach(row=>{
    const label=row.querySelector('.er-label')?.value?.trim();
    if(label)results.push({label,value:row.querySelector('.er-value')?.value||'',unit:row.querySelector('.er-unit')?.value||'',refRange:row.querySelector('.er-ref')?.value||''});
  });
  const d=D();
  d.exams[uid()]={name,date:document.getElementById('m-edate').value,results,notes:document.getElementById('m-enotes').value};
  save();closeModal();toast('Exame adicionado');
}

function modalViewExam(){
  const id=S._examId;
  const e=D().exams[id];
  if(!e)return'<h3>Exame não encontrado</h3>';
  let h=`<h3>${esc(e.name)}</h3>`;
  h+=`<div style="font-family:var(--mono);font-size:.65rem;color:var(--t3);margin-bottom:12px">${fmtDate(e.date)}</div>`;
  if(e.results&&e.results.length>0){
    h+=`<table class="tbl"><thead><tr><th>Exame</th><th>Valor</th><th>Unidade</th><th>Referência</th></tr></thead><tbody>`;
    e.results.forEach(r=>{
      h+=`<tr><td>${esc(r.label)}</td><td style="font-weight:600">${esc(r.value)}</td><td>${esc(r.unit)}</td><td style="color:var(--t3)">${esc(r.refRange)}</td></tr>`;
    });
    h+=`</tbody></table>`;
  }
  if(e.notes)h+=`<div style="margin-top:10px;font-size:.82rem;color:var(--t2)">${esc(e.notes)}</div>`;
  h+=`<div class="ma"><button class="btn-s" onclick="closeModal()">Fechar</button></div>`;
  return h;
}

function modalNewCycle(){
  let h=`<h3>Novo Ciclo</h3>`;
  h+=`<div class="fg"><label class="fl">Nome</label><input class="fi" id="m-cname" placeholder="Bulk Inverno 2026"></div>`;
  h+=`<div class="fg"><label class="fl">Tipo</label><select class="fi" id="m-ctype">`;
  CYCLE_TYPES.forEach(t=>h+=`<option value="${t.id}">${t.n}</option>`);
  h+=`</select></div>`;
  h+=`<div class="fg"><label class="fl">Data Início</label><input class="fi" type="date" id="m-cstart" value="${todayS()}"></div>`;
  h+=`<div class="fg"><label class="fl">Data Fim (opcional)</label><input class="fi" type="date" id="m-cend"></div>`;
  h+=`<div class="fg"><label class="fl">Notas</label><textarea class="fi" id="m-cnotes" rows="2"></textarea></div>`;
  h+=`<div class="ma"><button class="btn-s" onclick="closeModal()">Cancelar</button><button class="btn-p" onclick="saveNewCycle()">Salvar</button></div>`;
  return h;
}

function saveNewCycle(){
  const name=document.getElementById('m-cname').value.trim();
  if(!name)return toast('Nome é obrigatório','err');
  const d=D();
  d.cycles[uid()]={name,type:document.getElementById('m-ctype').value,startDate:document.getElementById('m-cstart').value,endDate:document.getElementById('m-cend').value||null,notes:document.getElementById('m-cnotes').value};
  save();closeModal();toast('Ciclo criado');
}

function modalNewNote(){
  const d=D();
  const tags=Object.entries(d.tags||{}).map(([id,t])=>({id,...t}));
  let h=`<h3>Nova Nota</h3>`;
  h+=`<div class="fg"><label class="fl">Origem</label><select class="fi" id="m-nsource">`;
  NOTE_SOURCES.forEach(s=>h+=`<option value="${s.id}">${s.n}</option>`);
  h+=`</select></div>`;
  h+=`<div class="fg"><label class="fl">Conteúdo (use **texto** para negrito)</label><textarea class="fi" id="m-ncontent" rows="5" placeholder="Sua nota..."></textarea></div>`;
  if(tags.length>0){
    h+=`<div class="fg"><label class="fl">Tags</label><div class="chip-row" id="m-ntags">`;
    tags.forEach(t=>h+=`<button class="chip" data-id="${t.id}" onclick="this.classList.toggle('on')" style="border-color:${t.color};color:${t.color}">${esc(t.name)}</button>`);
    h+=`</div></div>`;
  }
  h+=`<div class="ma"><button class="btn-s" onclick="closeModal()">Cancelar</button><button class="btn-p" onclick="saveNewNote()">Salvar</button></div>`;
  return h;
}

function saveNewNote(){
  const content=document.getElementById('m-ncontent').value.trim();
  if(!content)return toast('Conteúdo é obrigatório','err');
  const tagIds=[];
  document.querySelectorAll('#m-ntags .chip.on').forEach(el=>tagIds.push(el.dataset.id));
  const d=D();
  d.notes[uid()]={date:todayS(),content,source:document.getElementById('m-nsource').value,tags:tagIds};
  save();closeModal();toast('Nota criada');
}

function modalEditNote(){
  const id=S._editNoteId;
  const n=D().notes[id];
  if(!n)return'<h3>Nota não encontrada</h3>';
  const tags=Object.entries(D().tags||{}).map(([tid,t])=>({id:tid,...t}));
  let h=`<h3>Editar Nota</h3>`;
  h+=`<div class="fg"><label class="fl">Origem</label><select class="fi" id="m-ensource">`;
  NOTE_SOURCES.forEach(s=>h+=`<option value="${s.id}"${n.source===s.id?' selected':''}>${s.n}</option>`);
  h+=`</select></div>`;
  h+=`<div class="fg"><label class="fl">Conteúdo</label><textarea class="fi" id="m-encontent" rows="5">${esc(n.content||'')}</textarea></div>`;
  if(tags.length>0){
    h+=`<div class="fg"><label class="fl">Tags</label><div class="chip-row" id="m-entags">`;
    tags.forEach(t=>h+=`<button class="chip${(n.tags||[]).includes(t.id)?' on':''}" data-id="${t.id}" onclick="this.classList.toggle('on')" style="border-color:${t.color};color:${t.color}">${esc(t.name)}</button>`);
    h+=`</div></div>`;
  }
  h+=`<div class="ma"><button class="btn-s" onclick="closeModal()">Cancelar</button><button class="btn-p" onclick="updateNote('${id}')">Salvar</button></div>`;
  return h;
}

function updateNote(id){
  const d=D();
  d.notes[id].content=document.getElementById('m-encontent').value.trim();
  d.notes[id].source=document.getElementById('m-ensource').value;
  const tagIds=[];
  document.querySelectorAll('#m-entags .chip.on').forEach(el=>tagIds.push(el.dataset.id));
  d.notes[id].tags=tagIds;
  save();closeModal();toast('Nota atualizada');
}

function modalManageTags(){
  const d=D();
  const tags=Object.entries(d.tags||{}).map(([id,t])=>({id,...t}));
  let h=`<h3>🏷️ Gerenciar Tags</h3>`;
  h+=`<div style="margin-bottom:12px">`;
  h+=`<div class="fi-row"><input class="fi fi-sm" id="m-tagname" placeholder="Nome da tag"><select class="fi fi-sm" id="m-tagcolor" style="max-width:120px">`;
  PCOLS.forEach(c=>h+=`<option value="${c}" style="color:${c}">⬤ ${c}</option>`);
  h+=`</select><button class="btn-p" style="padding:6px 12px" onclick="addTag()">+</button></div></div>`;
  tags.forEach(t=>{
    h+=`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--b1)"><span style="width:12px;height:12px;border-radius:50%;background:${t.color}"></span><span style="flex:1;font-size:.85rem">${esc(t.name)}</span><button style="color:var(--r);font-size:.6rem;cursor:pointer;background:none;border:none" onclick="delete D().tags['${t.id}'];save();S.modal='manageTags';R()">✕</button></div>`;
  });
  h+=`<div class="ma"><button class="btn-s" onclick="closeModal()">Fechar</button></div>`;
  return h;
}

function addTag(){
  const name=document.getElementById('m-tagname').value.trim();
  if(!name)return toast('Nome é obrigatório','err');
  const d=D();
  if(!d.tags)d.tags={};
  d.tags[uid()]={name,color:document.getElementById('m-tagcolor').value};
  save();S.modal='manageTags';R();toast('Tag criada');
}

function modalSetPin(){
  return`<h3>Definir PIN (4 dígitos)</h3><div class="fg"><label class="fl">PIN</label><input class="fi" type="password" maxlength="4" id="m-pin" placeholder="1234" inputmode="numeric"></div><div class="ma"><button class="btn-s" onclick="closeModal()">Cancelar</button><button class="btn-p" onclick="savePin()">Salvar</button></div>`;
}

function savePin(){
  const pin=document.getElementById('m-pin').value;
  if(pin.length!==4||!/^\d{4}$/.test(pin))return toast('PIN deve ter 4 dígitos','err');
  D().settings.pin=pin;
  save();closeModal();toast('PIN definido');
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
function init(){
  S.data=getL();
  if(!S.data||!S.data.settings)S.data=defaultData();
  if(S.data.settings?.pin)S.locked=true;
  R();
  initFB();
}

init();
</script>
</body>
</html>
